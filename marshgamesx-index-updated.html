<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MarshGamesX</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&family=Exo+2:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --cyan: #00f5ff;
    --teal: #00b4c8;
    --dark: #050a0f;
    --mid: #0a1520;
    --glow: rgba(0,245,255,0.18);
    --glow-strong: rgba(0,245,255,0.45);
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--dark);
    color: #e0f7fa;
    font-family: "Exo 2", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content:"";
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    z-index:0;
  }
  @keyframes gridMove { from{background-position:0 0} to{background-position:40px 40px} }

  body::after {
    content:"";
    position:fixed;
    top:-120px; left:50%; transform:translateX(-50%);
    width:600px; height:300px;
    background: radial-gradient(ellipse, rgba(0,180,200,0.25) 0%, transparent 70%);
    z-index:0;
    pointer-events:none;
  }

  .container {
    position:relative; z-index:1;
    width:100%; max-width:480px;
    padding: 48px 24px 60px;
    display:flex; flex-direction:column; align-items:center; gap:0;
  }

  .avatar-wrap {
    position:relative;
    width:120px; height:120px;
    margin-bottom: 20px;
  }
  .avatar-wrap::before {
    content:"";
    position:absolute; inset:-6px;
    border-radius:50%;
    background: conic-gradient(var(--cyan), var(--teal), #003344, var(--cyan));
    animation: spin 4s linear infinite;
    z-index:-1;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .avatar-wrap::after {
    content:"";
    position:absolute; inset:-18px;
    border-radius:50%;
    background: radial-gradient(circle, var(--glow-strong) 0%, transparent 70%);
    z-index:-2;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
  .avatar {
    width:120px; height:120px;
    border-radius:50%;
    object-fit:cover;
    border: 3px solid var(--dark);
    display:block;
  }

  .title-congrats {
    font-family: "Orbitron", monospace;
    font-size: clamp(22px, 6vw, 30px);
    font-weight:900;
    letter-spacing: 0.12em;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,245,255,0.4);
    animation: flicker 6s infinite;
    text-align:center;
    margin-bottom:4px;
  }
  @keyframes flicker {
    0%,94%,96%,100%{opacity:1}
    95%{opacity:0.85}
  }
  .title-sub {
    font-family: "Rajdhani", sans-serif;
    font-size: clamp(14px, 4vw, 18px);
    font-weight:600;
    letter-spacing:0.22em;
    color: rgba(180,230,240,0.75);
    text-align:center;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .divider {
    width:100%; height:1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    margin-bottom: 32px;
    box-shadow: 0 0 8px var(--cyan);
  }

  .links { width:100%; display:flex; flex-direction:column; gap:14px; }

  .link-btn {
    display:flex; align-items:center; gap:16px;
    padding: 16px 22px;
    background: rgba(0,20,30,0.7);
    border: 1px solid rgba(0,245,255,0.2);
    border-radius: 6px;
    text-decoration:none;
    color: #c8eef5;
    font-family:"Rajdhani", sans-serif;
    font-size:18px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    position:relative;
    overflow:hidden;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    backdrop-filter: blur(4px);
  }
  .link-btn::before {
    content:"";
    position:absolute; left:-100%; top:0;
    width:60%; height:100%;
    background: linear-gradient(90deg, transparent, rgba(0,245,255,0.08), transparent);
    transition: left 0.45s ease;
  }
  .link-btn:hover::before { left:150%; }
  .link-btn:hover {
    border-color: var(--cyan);
    box-shadow: 0 0 18px rgba(0,245,255,0.25), inset 0 0 12px rgba(0,245,255,0.06);
    transform: translateX(4px);
    color: #fff;
  }

  .link-icon {
    width:36px; height:36px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .link-icon svg { width:28px; height:28px; }
  .link-label { flex:1; }
  .link-sub {
    font-size:11px; font-weight:400;
    letter-spacing:0.1em;
    color:rgba(0,245,255,0.4);
    font-family:"Exo 2",sans-serif;
    text-transform:lowercase;
  }
  .link-arrow {
    font-size:20px;
    color: rgba(0,245,255,0.4);
    transition: color 0.2s, transform 0.2s;
  }
  .link-btn:hover .link-arrow {
    color: var(--cyan);
    transform: translateX(4px);
  }

  .footer {
    margin-top:48px;
    font-size:11px;
    letter-spacing:0.2em;
    color: rgba(0,245,255,0.2);
    text-transform:uppercase;
    font-family:"Exo 2", sans-serif;
  }

  .container > * {
    opacity:0;
    animation: fadeUp 0.6s ease forwards;
  }
  .avatar-wrap { animation-delay:0.1s; }
  .title-congrats { animation-delay:0.25s; }
  .title-sub { animation-delay:0.35s; }
  .divider { animation-delay:0.45s; }
  .links { animation-delay:0.55s; }
  .footer { animation-delay:0.75s; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>
